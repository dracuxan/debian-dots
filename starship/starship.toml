"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "fg:#a0a0a0"

[character]
success_symbol = "[‚ùØ](bold #99ffe4)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](bold #ff8080)"

[git_branch]
